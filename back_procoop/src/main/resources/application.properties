# ---------------------------------------------------------
# CONFIGURACIÓN DE BASE DE DATOS
#
# Este archivo define la conexión entre el backend y MySQL.
# Permite que la aplicación persista información como productos,
# stock y carrito.
#
# ddl-auto=update permite crear y actualizar las tablas automáticamente
# en base a las entidades del proyecto.
# ---------------------------------------------------------
spring.application.name=back_procoop
# ----------------------------------------
# CONEXIÓN A LA BASE DE DATOS
# ----------------------------------------

spring.datasource.url=jdbc:mysql://localhost:3306/procoop_db
spring.datasource.username=root
spring.datasource.password=Persistencia3.0

# ----------------------------------------
# CONFIGURACIÓN JPA (Hibernate)
# ----------------------------------------

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true