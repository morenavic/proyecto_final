<main class="main-contenedor">

  <section id="panel-cliente-documentos">

    <div class="docs-container">

      <!-- HEADER -->
      <header class="docs-header">
        <h2 class="titulo">Documentos</h2>
        <p class="subtitulo">Manuales y guías disponibles para descarga</p>
      </header>

      <!-- CONTROLES -->
      <div class="docs-controls">

        <input
          type="text"
          placeholder="Buscar documento..."
          [(ngModel)]="busqueda" />

        <div class="filtros">
          <button
  [class.activo]="filtro === 'todos'"
  (click)="setFiltro('todos')">
  Todos
</button>

<button
  [class.activo]="filtro === 'manual'"
  (click)="setFiltro('manual')">
  Manuales
</button>

<button
  [class.activo]="filtro === 'guia'"
  (click)="setFiltro('guia')">
  Guías
</button>
        </div>



      </div>

      <!-- LISTA -->
      <div class="docs-grid">

        @for (doc of documentosVisibles; track doc.nombre) {
          <div class="doc-card">

            <div class="doc-icon">📄</div>

            <div class="doc-info">
              <h3>{{ doc.nombre }}</h3>
              <p>{{ doc.descripcion }}</p>
            </div>

            <button class="btn-descargar">
              Descargar
            </button>

          </div>
        }

      </div>

      <!-- VER MÁS -->
      @if (hayMasDocumentos) {
        <div class="ver-mas-container">
          <button class="btn-ver-mas" (click)="verMas()">
            Ver más
          </button>
        </div>
      }

    </div>

  </section>

</main>
