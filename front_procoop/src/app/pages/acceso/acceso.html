<main class="main-contenedor">
  <!-- ============================
       LOGIN / ACCESO CLIENTES
       Pantalla central de autenticación.
       Encapsula el ingreso al sistema.
       ============================ -->

       <!-- ⚠️ Mejorar la dispocisión de los elementos  -->

  <section class="pantalla-login">
    <div class="login-card form-card">
      <!-- Encabezado del acceso -->
      <h2 class="titulo">Acceso exclusivo para clientes</h2>
      <p class="subtitulo">Ingresa con tu email y contraseña</p>

      <!--
        Formulario de login controlado desde el componente.
        La validación, el estado de carga y el feedback UX
        se manejan de forma centralizada en la lógica.
      -->
      <form [formGroup]="formAcceso" (ngSubmit)="iniciarSesion()">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="cliente@cooperativa.com"
        />

        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="********"
        />

        <!--
          Acciones principales del login.
          Se prioriza una única acción principal (iniciar sesión)
          y se deja la recuperación de contraseña como acción secundaria.
        -->
        <div class="login-acciones">
          <button
            type="submit"
            class="nav-link"
            [disabled]="cargando"
          >
            <!--
              Feedback inmediato del estado de autenticación.
              El texto del botón refleja el estado del proceso.
            -->
            @if (cargando) {
              Iniciando sesión...
            } @else {
              Iniciar sesión
            }
          </button>

          <!-- Acción secundaria: recuperación de credenciales -->
          <a routerLink="/recuperar-contrasenia" class="link-secundario">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <!--
          Mensaje informativo para usuarios no activados.
          Refuerza el flujo correcto sin exponer lógica interna.
        -->
        <p class="login-ayuda">
          Si no tenés cuenta activada, comunicate con soporte.
          Si ya tenés las credenciales,
          <a routerLink="/activar-cuenta" class="link-secundario">
            activá tu cuenta
          </a>.
        </p>
      </form>
    </div>
  </section>
</main>

<!--
  Modal de feedback UX.
  Se utiliza para comunicar errores o estados relevantes,
  bloqueando la interacción con el fondo y forzando confirmación.
-->
@if (mostrarModal) {
  <div class="modal-overlay">
    <div class="modal">
      <h3 class="modal-titulo">Atención</h3>

      <!-- Mensaje dinámico definido desde el componente -->
      <p class="modal-mensaje">
        {{ mensajeModal }}
      </p>

      <!-- Acción explícita para cerrar el modal y volver al acceso -->
      <button class="nav-link" (click)="cerrarModal()">
        Aceptar
      </button>
    </div>
  </div>
}
