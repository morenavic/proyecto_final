<main class="main-contenedor">
  <section id="productos-listado" class="pantalla">
    <header class="encabezado-seccion">
      <h2 class="titulo">Productos</h2>
      <p class="subtitulo">Listado de productos principales</p>
    </header>

    <div class="grid-productos">
      @for (producto of productos; track producto.id) {
        <div class="producto-card">
          <!-- Usamos titulo (no nombre) -->
          <h4 class="producto-titulo">
            {{ producto.titulo }}
          </h4>

          <p class="producto-descripcion">
            {{ producto.descripcion }}
          </p>

          <button [routerLink]="['/productos', producto.id]" class="nav-link">Ver más</button>
        </div>
      }
    </div>
  </section>
</main>
