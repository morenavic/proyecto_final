<main class="main-contenedor">
  <section class="pantalla detalle-producto">
    <!--
      Render condicional del contenido.
      Evita errores de acceso a propiedades mientras se resuelve el producto.
    -->
    @if (producto) {
      <div class="detalle-layout">
        <!-- CONTENIDO PRINCIPAL -->
        <div class="detalle-info modo-contenedor">
          <!--
            Se muestran datos del producto seleccionados dinámicamente
            según el id recibido por la ruta.
          -->
          <h2 class="titulo">{{ producto.titulo }}</h2>
          <p class="subtitulo">{{ producto.subtitulo }}</p>

          <img [src]="producto.imagen" alt="Imagen del producto" class="detalle-imagen" />

          <p class="detalle-descripcion">
            {{ producto.descripcion }}
          </p>

          <!--
            Acción principal del módulo:
            redirige a contacto para conversión (consulta del producto).
          -->
          <button routerLink="/contacto" class="nav-link">Solicitar información</button>
        </div>

        <!-- SIDEBAR -->
        <aside class="detalle-sidebar">
          <!--
            Información complementaria fija.
            No depende del producto (actualmente hardcodeada).
          -->
          <div class="modo-contenedor">
            <strong>Ficha rápida</strong>
            <ul class="lista-ficha">
              <li>Instalación: On-premise / Cloud</li>
              <li>Soporte: 24/7</li>
              <li>Integraciones: APIs REST</li>
            </ul>
          </div>

          <!--
            Información adicional del producto.
            Se mantiene separada para mejorar legibilidad y jerarquía visual.
          -->
          <div class="info-extra-contenedor">
            <h3 class="titulo chico">Información extra</h3>

            <div class="filosofia-cards">
              <div class="filo-card">
                <p class="info-extra">
                  {{ producto.infoExtra }}
                </p>
              </div>
            </div>
          </div>
        </aside>
      </div>
    } @else {
      <!--
        Estado de fallback cuando no se encuentra el producto.
        Evita pantalla en blanco y mejora UX.
      -->
      <p class="estado-vacio">Producto no encontrado</p>
    }
  </section>
</main>

<!--
  ⚠️ FUTURO BACKEND:
  - "producto" vendrá desde un servicio (API) en lugar de datos locales
  - "ficha rápida" debería formar parte del modelo del producto para ser dinámica
-->
