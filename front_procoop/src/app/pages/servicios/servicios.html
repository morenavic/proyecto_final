<main class="main-contenedor">
  <!--
    Contenedor principal que respeta el layout global
    (compensación de header/footer definidos en estilos globales).
  -->

  <!-- ============================
       SERVICIOS
       ============================ -->
  <section id="servicios" class="pantalla contenedor-centrado texto-centrado">
    <h2 class="titulo">Servicios</h2>
    <p class="subtitulo">Consultoría, implementación y capacitación</p>

    <div class="servicios-lista">
      <!--
        Render dinámico de servicios.

        Decisión clave:
        - `servicio.id` se usa como track (optimización)
        - y como ancla para navegación desde el header (fragmentos)

        Esto conecta directamente con los links tipo:
        /servicios#consultoria

        ⚠️ Dependencia importante:
        Los IDs deben coincidir exactamente con los fragment del header.

        🔄 FUTURO BACKEND:
        - Validar que la API mantenga estos IDs o mapearlos antes de renderizar.
      -->
      @for (servicio of servicios; track servicio.id) {
        <!--
          Ancla invisible para scroll preciso.
          Evita problemas de offset por header fijo.
        -->
        <span class="ancla" [id]="servicio.id"></span>

        <div class="servicio-item animar">
          <h4 class="servicio-titulo">{{ servicio.titulo }}</h4>
          <p class="servicio-descripcion">{{ servicio.descripcion }}</p>
        </div>
      }
    </div>
  </section>

  <!-- ============================
       METODOLOGÍA
       ============================ -->

  <!--
    Ancla independiente para navegación directa a metodología.
  -->
  <span class="ancla" [id]="metodologia.id"></span>

  <section class="pantalla contenedor-centrado texto-centrado">
    <h2 class="titulo">{{ metodologia.titulo }}</h2>

    <div class="metodologia-columnas">
      <!--
        Render de pasos de metodología.

        Decisión:
        Separar `metodologia` de `servicios` para mantener claridad semántica
        y evitar mezclar tipos de contenido distintos.

        ⚠️ track por título:
        Se asume que los títulos son únicos dentro de la lista.

        🔄 FUTURO BACKEND:
        - Evaluar usar IDs únicos en lugar de títulos para mayor robustez.
      -->
      @for (paso of metodologia.pasos; track paso.titulo) {
        <div class="metodologia-card animar">
          <h4>{{ paso.titulo }}</h4>
          <p>{{ paso.descripcion }}</p>
        </div>
      }
    </div>
  </section>
</main>
